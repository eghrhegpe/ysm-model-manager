<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>YSM 模型管理器</title>
    <link rel="stylesheet" href="css/variables.css" />
    <script src="js/bus.js"></script>
    <script src="js/components/app-toast.js"></script>
    <script src="js/components/app-nav.js"></script>
    <script src="js/components/app-sidebar.js"></script>
    <script src="js/components/app-tree.js"></script>
    <script src="js/components/app-preview.js"></script>
    <script src="js/components/app-content.js"></script>
    <script src="js/components/context-menu.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden">
    <div style="display: flex; height: 100vh; overflow: hidden">
      <app-nav></app-nav>
      <app-content></app-content>
    </div>
    <app-toast></app-toast>
    <context-menu></context-menu>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        bus.emit("nav:change", { page: "dashboard" });
        setTimeout(() => {
          bus.emit("toast:show", {
            msg: "✅ YSM 管理器 v1.0 预告版",
            duration: 3000,
            type: "success",
          });
        }, 500);
      });
    </script>
  </body>
</html>
