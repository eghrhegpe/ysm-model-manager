<main class="main">
  <div class="main-header">
    <div class="main-header-row">
      <button id="btn-toggle-sidebar" class="toggle-btn" title="折叠/展开左栏">
        ◀
      </button>
      <span class="main-header-label">📦 仓库</span>
      <button id="btn-enable-all" class="main-btn-small">✅ 全部启用</button>
      <button id="btn-disable-all" class="main-btn-small">⛔ 全部禁用</button>
      <button id="btn-sync-toggle" class="main-btn-small">▶️ 同步状态</button>
      <select id="sort-select" class="main-select">
        <option value="name">名称</option>
        <option value="size">大小</option>
        <option value="date">日期</option>
      </select>
      <button id="btn-toggle-preview" class="toggle-btn" title="折叠/展开右栏">
        ▶
      </button>
    </div>
    <input
      id="search-input"
      type="text"
      placeholder="🔍 搜索模型名称"
      class="main-search-input"
    />
  </div>
  <div id="tree" class="main-list">
    <div
      style="
        font-size: 11px;
        color: var(--muted);
        padding: 12px;
        text-align: center;
      "
    >
      请选择仓库目录
    </div>
  </div>
  <div class="main-footer">
    <button class="sb-btn" id="btn-repo">📁 选择仓库目录</button>
  </div>
</main>
