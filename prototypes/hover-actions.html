<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>悬停操作 + 撤销原型</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #11111b;
    color: #cdd6f4;
    padding: 30px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; color: #fff; }
  .subtitle { color: #6c7086; font-size: 12px; margin-bottom: 24px; }

  /* ===== 卡片头部 ===== */
  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #181825;
    border-radius: 10px 10px 0 0;
    border: 1px solid rgba(255,255,255,.06);
    border-bottom: none;
  }
  .card-header .title { font-size: 13px; font-weight: 600; flex: 1; }
  .card-header .count { font-size: 10px; color: #6c7086; }
  .card-header .search-input {
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,.08);
    background: #11111b;
    color: #cdd6f4;
    font-size: 11px;
    outline: none;
    width: 160px;
    font-family: inherit;
  }
  .card-header .search-input::placeholder { color: #6c7086; }

  /* ===== 列表 ===== */
  .list-body {
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    margin-bottom: 30px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    font-size: 12px;
    position: relative;
    transition: background .12s;
  }
  .row:hover { background: #2a2a42; }
  .row .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .size { font-size: 10px; color: #6c7086; white-space: nowrap; }
  .row .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* 悬停滑出操作按钮 */
  .row .hover-actions {
    position: absolute;
    right: 6px;
    display: flex;
    gap: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .12s;
  }
  .row:hover .hover-actions {
    opacity: 1;
    pointer-events: auto;
  }
  .row .hover-actions button {
    width: 24px; height: 24px;
    border: none;
    border-radius: 4px;
    background: #181825;
    color: #cdd6f4;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .12s, color .12s;
  }
  .row .hover-actions button:hover {
    background: #7c83ff33;
    color: #7c83ff;
  }
  .row .hover-actions button.danger:hover {
    background: #f38ba833;
    color: #f38ba8;
  }

  /* 过渡动画：row 移除时 */
  .row.removing {
    background: #f38ba822;
    transition: all .3s;
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    overflow: hidden;
  }

  /* ===== Toast 撤销 ===== */
  .toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 999;
  }
  .toast {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 8px;
    background: #2a2a42;
    color: #cdd6f4;
    font-size: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,.4);
    animation: slideUp .25s ease;
    border: 1px solid rgba(255,255,255,.06);
  }
  .toast .msg { flex: 1; }
  .toast .undo-btn {
    padding: 4px 10px;
    border-radius: 5px;
    border: none;
    background: #7c83ff33;
    color: #7c83ff;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: background .12s;
  }
  .toast .undo-btn:hover { background: #7c83ff55; }
  .toast .close-btn {
    background: none;
    border: none;
    color: #6c7086;
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
  }
  .toast .close-btn:hover { color: #cdd6f4; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ===== 操作历史面板 ===== */
  h2 { font-size: 16px; margin: 30px 0 10px; color: #a6adc8; }
  .history-panel {
    background: #181825;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,.06);
  }
  .history-panel .entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    color: #6c7086;
  }
  .history-panel .entry .time { font-size: 10px; width: 60px; flex-shrink: 0; }
  .history-panel .entry .action { flex: 1; }
  .history-panel .entry:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.04); }
  .history-panel .empty { color: #6c7086; font-style: italic; }
</style>
</head>
<body>

<h1>悬停快捷操作 + 撤销 Toast</h1>
<div class="subtitle">鼠标悬停在模型行上，右侧滑出操作按钮。点击操作后出现 Toast 撤销提示。</div>

<!-- 卡片 -->
<div class="card-header">
  <span class="title">📦 我的整合包</span>
  <span class="count">6 个模型</span>
  <input class="search-input" placeholder="🔍 筛选...">
</div>
<div class="list-body" id="model-list">
  <!-- JS 生成 -->
</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toast-container"></div>

<!-- 历史记录 -->
<h2>📋 操作历史（最近 5 步）</h2>
<div class="history-panel" id="history-panel">
  <div class="empty">暂无操作</div>
</div>

<div style="margin-top:20px; font-size:11px; color:#6c7086; line-height:1.8">
  <strong>💡 说明</strong><br>
  · 每行右侧悬停时显示：⛔ 禁用 / 📂 打开 / 🗑️ 删除<br>
  · 点击操作后底部滑出 Toast，内含「撤销」按钮<br>
  · 撤销恢复会从历史中移除，超出 5 步自动覆盖最早记录
</div>

<script>
const mockData = [
  { name: "steve_skin.ysm", size: "1.2 MB", status: "synced", banned: false },
  { name: "alex_deluxe.ysm", size: "2.4 MB", status: "synced", banned: false },
  { name: "dragon_armor.zip", size: "3.8 MB", status: "missing", banned: false },
  { name: "custom_hat.ysm", size: "0.8 MB", status: "extra", banned: false },
  { name: "neon_sword.ysm", size: "1.5 MB", status: "synced", banned: false },
  { name: "old_model.ysm", size: "0.9 MB", status: "synced", banned: true },
];

// 操作历史（最多 5 步）
const history = [];
const MAX_HISTORY = 5;

function addHistory(action, name) {
  const time = new Date().toLocaleTimeString();
  history.unshift({ time, action, name });
  if (history.length > MAX_HISTORY) history.pop();
  renderHistory();
}

function renderHistory() {
  const panel = document.getElementById('history-panel');
  if (history.length === 0) {
    panel.innerHTML = '<div class="empty">暂无操作</div>';
    return;
  }
  panel.innerHTML = history.map(h => `
    <div class="entry">
      <span class="time">${h.time}</span>
      <span class="action">${h.action} — <strong>${h.name}</strong></span>
    </div>
  `).join('');
}

// 渲染列表
function renderList(items) {
  const container = document.getElementById('model-list');
  container.innerHTML = items.map((item, i) => {
    const statusColors = { synced: '#a6e3a1', missing: '#f38ba8', extra: '#f9a826', disabled: '#6c7086' };
    return `
      <div class="row" data-index="${i}" data-name="${item.name}" data-banned="${item.banned}">
        <span class="status-dot" style="background:${statusColors[item.banned ? 'disabled' : item.status]}"></span>
        <span class="name">${item.name}</span>
        <span class="size">${item.size}</span>
        <div class="hover-actions">
          <button class="toggle-btn" title="${item.banned ? '启用' : '禁用'}">${item.banned ? '✅' : '⛔'}</button>
          <button class="folder-btn" title="打开文件夹">📂</button>
          <button class="delete-btn danger" title="删除">🗑️</button>
        </div>
      </div>
    `;
  }).join('');

  // 绑定事件
  container.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const row = e.target.closest('.row');
      const name = row.dataset.name;
      const wasBanned = row.dataset.banned === 'true';
      const action = wasBanned ? '✅ 启用' : '⛔ 禁用';
      row.dataset.banned = (!wasBanned).toString();
      // 更新状态点颜色
      row.querySelector('.status-dot').style.background = wasBanned ? '#a6e3a1' : '#6c7086';
      btn.textContent = wasBanned ? '⛔' : '✅';
      btn.title = wasBanned ? '禁用' : '启用';
      addHistory(action, name);
      showToast(action + '：' + name, () => {
        // 撤销：恢复原状态
        row.dataset.banned = wasBanned.toString();
        row.querySelector('.status-dot').style.background = wasBanned ? '#6c7086' : '#a6e3a1';
        btn.textContent = wasBanned ? '✅' : '⛔';
        btn.title = wasBanned ? '启用' : '禁用';
        addHistory('↩️ 撤销 ' + action, name);
        history.splice(history.findIndex(h => h.action === action && h.name === name), 1);
        renderHistory();
      });
    });
  });

  container.querySelectorAll('.folder-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const row = e.target.closest('.row');
      const name = row.dataset.name;
      addHistory('📂 打开文件夹', name);
      showToast('📂 已打开：' + name);
    });
  });

  container.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const row = e.target.closest('.row');
      const name = row.dataset.name;
      addHistory('🗑️ 删除', name);
      row.classList.add('removing');
      setTimeout(() => row.style.display = 'none', 300);
      showToast('🗑️ 已删除：' + name, () => {
        // 撤销删除
        row.style.display = '';
        row.classList.remove('removing');
        addHistory('↩️ 撤销删除', name);
      });
    });
  });
}

// Toast 系统
function showToast(msg, undoCallback) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <span class="msg">${msg}</span>
    ${undoCallback ? '<button class="undo-btn">↩ 撤销</button>' : ''}
    <button class="close-btn">✕</button>
  `;
  container.appendChild(toast);

  // 撤销
  if (undoCallback) {
    toast.querySelector('.undo-btn').addEventListener('click', () => {
      undoCallback();
      toast.remove();
      // 显示撤销成功
      const undoToast = document.createElement('div');
      undoToast.className = 'toast';
      undoToast.innerHTML = `<span class="msg">✅ 已撤销</span><button class="close-btn">✕</button>`;
      container.appendChild(undoToast);
      setTimeout(() => undoToast.remove(), 2000);
    });
  }

  // 关闭
  toast.querySelector('.close-btn').addEventListener('click', () => toast.remove());

  // 自动消失（4 秒）
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4000);
}

// 初始渲染
renderList(mockData);
</script>
</body>
</html>
